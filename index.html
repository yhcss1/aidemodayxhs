<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ff2442">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>AI Demo Day | 小红书</title>
<style>
:root {
  --red: #ff2442;
  --red-light: #fff0f2;
  --bg: #f5f5f7;
  --card: #ffffff;
  --text: #1a1a1a;
  --text2: #555;
  --text3: #999;
  --border: #e8e8e8;
  --optimizer: #6366f1;
  --optimizer-bg: #eef2ff;
  --builder: #f59e0b;
  --builder-bg: #fffbeb;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --shadow-hover: 0 8px 30px rgba(0,0,0,0.12);
  --radius: 14px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Helvetica Neue", sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* Safe area */
body { padding-top: env(safe-area-inset-top); }

/* Header */
.header {
  background: linear-gradient(135deg, #ff2442 0%, #ff6b81 40%, #ff8fa0 70%, #ffb3c0 100%);
  color: white; padding: 44px 24px 36px; text-align: center;
  position: relative; overflow: hidden;
}
.header::before {
  content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
  background: radial-gradient(circle at 30% 70%, rgba(255,255,255,0.12) 0%, transparent 40%),
              radial-gradient(circle at 75% 25%, rgba(255,255,255,0.08) 0%, transparent 35%);
  animation: shimmer 8s ease-in-out infinite alternate;
}
@keyframes shimmer { from { transform: rotate(0deg); } to { transform: rotate(3deg); } }
.header h1 { font-size: 36px; font-weight: 800; position: relative; letter-spacing: 2px; }
.header .subtitle { font-size: 15px; opacity: 0.9; margin-top: 6px; position: relative; font-weight: 500; }

/* Stats row inside header */
.header-stats {
  display: flex; justify-content: center; gap: 32px;
  margin-top: 20px; position: relative;
}
.header-stat { text-align: center; }
.header-stat-num { font-size: 28px; font-weight: 800; }
.header-stat-label { font-size: 12px; opacity: 0.75; }

/* Track Tabs */
.track-tabs {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.track-tabs-inner {
  max-width: 1200px; margin: 0 auto;
  display: flex; align-items: center;
}
.track-tab {
  flex: 1; padding: 14px 0; border: none; background: none;
  font-size: 15px; font-weight: 600; color: var(--text3);
  cursor: pointer; border-bottom: 3px solid transparent;
  transition: all .2s; text-align: center; position: relative;
}
.track-tab:hover { color: var(--text); }
.track-tab.active { border-bottom-color: var(--red); }
.track-tab.active.opt-tab { color: var(--optimizer); border-bottom-color: var(--optimizer); }
.track-tab.active.bld-tab { color: var(--builder); border-bottom-color: var(--builder); }
.track-tab .tab-count {
  display: inline-block; padding: 1px 7px; border-radius: 10px;
  font-size: 11px; font-weight: 700; margin-left: 6px;
  background: var(--bg); color: var(--text3);
}
.track-tab.active.opt-tab .tab-count { background: var(--optimizer-bg); color: var(--optimizer); }
.track-tab.active.bld-tab .tab-count { background: var(--builder-bg); color: var(--builder); }

/* Filter bar */
.filter-bar {
  max-width: 1200px; margin: 0 auto;
  padding: 16px 24px 0;
  display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
}
.search-input {
  padding: 8px 18px; border-radius: 20px; border: 1.5px solid var(--border);
  font-size: 13px; outline: none; width: 280px; transition: all .2s; background: var(--card);
}
.search-input:focus { border-color: var(--red); box-shadow: 0 0 0 3px rgba(255,36,66,0.08); }

/* Content */
.content-area { max-width: 1200px; margin: 0 auto; padding: 16px 24px 40px; }

/* Project Grid */
.project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
.project-card {
  background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow); overflow: hidden;
  transition: all .25s; cursor: pointer; display: flex; flex-direction: column;
  position: relative;
}
.project-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); }
.project-img { width: 100%; height: 190px; object-fit: cover; display: block; }
.project-img-placeholder {
  width: 100%; height: 190px;
  display: flex; align-items: center; justify-content: center; font-size: 52px;
}
.project-img-placeholder.optimizer { background: linear-gradient(135deg, #eef2ff, #e0e7ff); }
.project-img-placeholder.builder { background: linear-gradient(135deg, #fffbeb, #fef3c7); }
.project-rank-badge {
  position: absolute; top: 12px; left: 12px;
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 14px; color: white;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.project-rank-badge.r1 { background: linear-gradient(135deg, #FFD700, #FFA500); }
.project-rank-badge.r2 { background: linear-gradient(135deg, #C0C0C0, #909090); }
.project-rank-badge.r3 { background: linear-gradient(135deg, #CD7F32, #B8860B); }
.project-rank-badge.rn { background: rgba(0,0,0,0.45); backdrop-filter: blur(4px); font-size: 12px; }
.project-body { padding: 16px 20px; flex: 1; display: flex; flex-direction: column; }
.project-title { font-size: 16px; font-weight: 700; margin: 0 0 6px; line-height: 1.4; }
.project-summary {
  font-size: 13px; color: var(--text2); line-height: 1.6; flex: 1;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.project-keywords { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
.keyword-tag { padding: 2px 8px; border-radius: 10px; background: var(--bg); font-size: 11px; color: var(--text2); }
.project-footer {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);
}
.project-author { font-size: 12px; color: var(--text3); }
.project-score-badge {
  padding: 3px 10px; border-radius: 12px;
  background: var(--red-light); color: var(--red);
  font-size: 12px; font-weight: 700;
}

/* Modal */
.modal-overlay {
  position: fixed; top:0; left:0; right:0; bottom:0;
  background: rgba(0,0,0,0.45); z-index: 1000;
  display: none; align-items: flex-start; justify-content: center;
  padding: 40px 24px; overflow-y: auto;
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--card); border-radius: 20px;
  max-width: 820px; width: 100%;
  box-shadow: 0 25px 60px rgba(0,0,0,0.2); position: relative;
  margin-bottom: 40px;
}
.modal-drag-handle {
  display: none;
  width: 36px; height: 4px; border-radius: 2px;
  background: rgba(0,0,0,0.15); margin: 10px auto 0; flex-shrink: 0;
}
.modal-close {
  position: absolute; top: 16px; right: 16px; z-index: 10;
  width: 36px; height: 36px; border-radius: 50%;
  border: none; background: rgba(0,0,0,0.06); font-size: 18px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background .2s;
}
.modal-close:hover { background: rgba(0,0,0,0.12); }
.modal-gallery {
  display: flex; gap: 6px; overflow-x: auto; padding: 24px 24px 0;
  scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
}
.modal-gallery img {
  height: 240px; border-radius: 12px; object-fit: cover;
  scroll-snap-align: start; flex-shrink: 0;
}
.modal-body { padding: 24px; }
.modal-body h2 { font-size: 22px; font-weight: 700; line-height: 1.3; margin-bottom: 6px; padding-right: 40px; }
.modal-track-score { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.modal-section { margin-top: 22px; }
.modal-section h3 {
  font-size: 14px; font-weight: 600; color: var(--text2); margin-bottom: 10px;
  border-left: 3px solid var(--red); padding-left: 10px;
}
.modal-section .content { font-size: 14px; line-height: 1.8; color: var(--text); }
.modal-section .content p { margin-bottom: 8px; }
.modal-section .content ol, .modal-section .content ul { padding-left: 20px; margin-bottom: 8px; }
.modal-links { display: flex; flex-direction: column; gap: 6px; }
.modal-link {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 16px; border-radius: 10px;
  background: var(--bg); color: var(--optimizer);
  text-decoration: none; font-size: 13px; font-weight: 500; transition: all .2s;
}
.modal-link:hover { background: var(--border); transform: translateX(2px); }
.ext-detail {
  background: linear-gradient(135deg, #f8f9ff, #fff5f7); border-radius: 12px;
  padding: 18px; margin-top: 12px; border: 1px solid rgba(99,102,241,0.1);
}
.ext-detail h4 { font-size: 14px; font-weight: 600; color: var(--optimizer); margin-bottom: 8px; }
.ext-detail p { font-size: 13px; line-height: 1.7; color: var(--text2); }
.ext-features { list-style: none; padding: 0; margin-top: 8px; }
.ext-features li {
  padding: 4px 0; font-size: 13px; color: var(--text2);
  padding-left: 18px; position: relative;
}
.ext-features li::before { content: '\2192'; position: absolute; left: 0; color: var(--red); font-weight: 700; }
.modal-meta { font-size: 12px; color: var(--text3); }
.empty-state { text-align: center; color: var(--text3); grid-column: 1/-1; padding: 60px 20px; }

/* Links displayed on card */
.card-links {
  display: flex; flex-direction: column; gap: 3px; margin-top: 8px;
}
.card-link {
  display: flex; align-items: center; gap: 4px;
  font-size: 11px; color: var(--optimizer); text-decoration: none;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  padding: 2px 0;
}
.card-link:hover { text-decoration: underline; }
.card-link-icon { flex-shrink: 0; font-size: 10px; }
.card-links-more { font-size: 10px; color: var(--text3); margin-top: 2px; }

/* Competitors section in modal */
.competitors-section { margin-top: 22px; }
.competitors-section h3 {
  font-size: 14px; font-weight: 600; color: var(--text2); margin-bottom: 10px;
  border-left: 3px solid #f59e0b; padding-left: 10px;
}
.competitor-list { display: flex; flex-direction: column; gap: 8px; }
.competitor-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 14px; border-radius: 10px;
  background: #fffbeb; border: 1px solid rgba(245,158,11,0.15);
  text-decoration: none; color: var(--text);
  transition: all .2s;
}
.competitor-item:hover { background: #fef3c7; transform: translateX(2px); }
.comp-stars {
  flex-shrink: 0; padding: 2px 8px; border-radius: 8px;
  background: rgba(245,158,11,0.15); color: #b45309;
  font-size: 11px; font-weight: 700; white-space: nowrap;
}
.comp-info { min-width: 0; }
.comp-name { font-size: 13px; font-weight: 600; color: var(--optimizer); word-break: break-all; }
.comp-desc { font-size: 12px; color: var(--text2); margin-top: 2px; }

/* Exclusive content badge on cards */
.exclusive-badge {
  position: absolute; top: 12px; right: 12px;
  padding: 3px 9px; border-radius: 8px;
  background: linear-gradient(135deg, #10b981, #059669); color: white;
  font-size: 10px; font-weight: 700; letter-spacing: 0.3px;
  box-shadow: 0 2px 6px rgba(16,185,129,0.3);
  z-index: 2;
}

/* Exclusive ext-detail in modal */
.ext-detail {
  background: linear-gradient(135deg, #f0fdf4, #ecfdf5); border-radius: 12px;
  padding: 18px; margin-top: 14px; border: 1px solid rgba(16,185,129,0.2);
  position: relative;
}
.ext-detail h4 { font-size: 14px; font-weight: 600; color: #059669; margin-bottom: 8px; }
.ext-detail p { font-size: 13px; line-height: 1.7; color: var(--text2); }
.ext-exclusive-tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 8px;
  background: linear-gradient(135deg, #10b981, #059669); color: white;
  font-size: 11px; font-weight: 600; margin-bottom: 10px;
}
.ext-source-tag {
  display: inline-block; padding: 2px 8px; border-radius: 6px;
  background: rgba(16,185,129,0.1); color: #059669;
  font-size: 11px; font-weight: 500; margin-left: 6px;
}

/* ===== Mobile: <= 480px (phones) ===== */
@media (max-width: 480px) {
  .header { padding: 28px 16px 22px; }
  .header h1 { font-size: 22px; letter-spacing: 1px; }
  .header .subtitle { font-size: 12px; margin-top: 4px; }
  .header-stats { gap: 16px; margin-top: 14px; }
  .header-stat-num { font-size: 20px; }
  .header-stat-label { font-size: 10px; }

  .track-tabs-inner { gap: 0; }
  .track-tab { font-size: 13px; padding: 11px 0; }
  .track-tab .tab-count { font-size: 10px; padding: 1px 5px; margin-left: 4px; }

  .filter-bar { padding: 12px 12px 0; }
  .search-input { width: 100%; font-size: 14px; padding: 10px 16px; border-radius: 12px; }

  .content-area { padding: 12px 12px 32px; }
  .project-grid { grid-template-columns: 1fr; gap: 14px; }

  .project-img, .project-img-placeholder { height: 160px; }
  .project-img-placeholder { font-size: 40px; }
  .project-body { padding: 12px 14px; }
  .project-title { font-size: 15px; margin-bottom: 4px; }
  .project-summary { font-size: 12px; -webkit-line-clamp: 2; }
  .project-keywords { margin-top: 6px; gap: 3px; }
  .keyword-tag { font-size: 10px; padding: 1px 6px; }
  .project-footer { margin-top: 8px; padding-top: 8px; }
  .project-author { font-size: 11px; }
  .project-score-badge { font-size: 11px; padding: 2px 8px; }
  .project-rank-badge { width: 26px; height: 26px; font-size: 11px; top: 8px; left: 8px; }
  .project-rank-badge.rn { font-size: 10px; }
  .exclusive-badge { font-size: 9px; padding: 2px 7px; top: 8px; right: 8px; }

  .modal-overlay { padding: 0; align-items: flex-end; }
  .modal {
    border-radius: 16px 16px 0 0; max-height: 92vh;
    overflow-y: auto; margin-bottom: 0;
    padding-bottom: env(safe-area-inset-bottom);
    -webkit-overflow-scrolling: touch;
  }
  .modal-drag-handle { display: block; }
  .modal-close { top: 10px; right: 10px; width: 32px; height: 32px; font-size: 16px; }
  .modal-gallery { padding: 16px 14px 0; gap: 4px; }
  .modal-gallery img { height: 160px; border-radius: 8px; }
  .modal-body { padding: 16px 14px 24px; }
  .modal-body h2 { font-size: 18px; padding-right: 36px; }
  .modal-track-score { gap: 8px; margin-bottom: 10px; }
  .modal-track-score .project-track { font-size: 10px; padding: 2px 8px; }
  .modal-track-score .project-score-badge { font-size: 12px; }
  .modal-meta { font-size: 11px; }
  .modal-section { margin-top: 16px; }
  .modal-section h3 { font-size: 13px; margin-bottom: 8px; }
  .modal-section .content { font-size: 13px; line-height: 1.7; }
  .modal-link { padding: 8px 12px; font-size: 12px; border-radius: 8px; }
  .ext-detail { padding: 14px; margin-top: 10px; }
  .ext-detail h4 { font-size: 13px; }
  .ext-detail p { font-size: 12px; }
  .ext-exclusive-tag { font-size: 10px; padding: 2px 8px; }
  .ext-source-tag { font-size: 10px; padding: 1px 6px; }
  .ext-features li { font-size: 12px; padding-left: 14px; }
  .card-link { font-size: 10px; }
  .card-links-more { font-size: 9px; }
  .competitor-item { padding: 8px 10px; gap: 8px; }
  .comp-stars { font-size: 10px; padding: 2px 6px; }
  .comp-name { font-size: 12px; }
  .comp-desc { font-size: 11px; }
}

/* ===== Tablet: 481px - 768px ===== */
@media (min-width: 481px) and (max-width: 768px) {
  .header { padding: 36px 20px 30px; }
  .header h1 { font-size: 28px; }
  .header .subtitle { font-size: 13px; }
  .header-stats { gap: 24px; margin-top: 16px; }
  .header-stat-num { font-size: 24px; }

  .track-tab { font-size: 14px; padding: 12px 0; }

  .filter-bar { padding: 14px 16px 0; }
  .search-input { width: 100%; }

  .content-area { padding: 14px 16px 36px; }
  .project-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .project-img, .project-img-placeholder { height: 170px; }

  .modal-overlay { padding: 24px 16px; }
  .modal { border-radius: 16px; }
  .modal-gallery img { height: 200px; }
  .modal-body { padding: 20px; }
  .modal-body h2 { font-size: 20px; }
}

/* ===== Small desktop: 769px - 1024px ===== */
@media (min-width: 769px) and (max-width: 1024px) {
  .project-grid { grid-template-columns: repeat(2, 1fr); }
}

/* ===== Touch: disable hover transforms ===== */
@media (hover: none) {
  .project-card:hover { transform: none; box-shadow: var(--shadow); }
  .modal-link:hover { transform: none; }
}
</style>
</head>
<body>

<div class="header">
  <h1>AI Demo Day</h1>
  <div class="subtitle">小红书 &middot; 战略 / 投资 / 用户研究</div>
  <div class="header-stats" id="header-stats"></div>
</div>

<div class="track-tabs">
  <div class="track-tabs-inner">
    <button class="track-tab opt-tab active" onclick="switchTrack('optimizer', this)">
      ⚡ Optimizer<span class="tab-count" id="opt-count"></span>
    </button>
    <button class="track-tab bld-tab" onclick="switchTrack('builder', this)">
      🛠️ Builder<span class="tab-count" id="bld-count"></span>
    </button>
  </div>
</div>

<div class="filter-bar">
  <input class="search-input" id="search-input" placeholder="搜索项目 / 关键词 / 作者..." oninput="onSearch(this.value)">
</div>

<div class="content-area">
  <div class="project-grid" id="project-grid"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>

<script src="combined_data.js"></script>
<script>
const demos = APP_DATA.demos;
let activeTrack = 'optimizer';
let searchQuery = '';

// Pre-compute ranks per track
function computeRanks() {
  const opt = demos.filter(d => d.track === 'optimizer').sort((a, b) => (b.score||0) - (a.score||0));
  const bld = demos.filter(d => d.track === 'builder').sort((a, b) => (b.score||0) - (a.score||0));
  opt.forEach((d, i) => d._rank = i + 1);
  bld.forEach((d, i) => d._rank = i + 1);
}
computeRanks();

function init() {
  const optCount = demos.filter(d => d.track === 'optimizer').length;
  const bldCount = demos.filter(d => d.track === 'builder').length;
  const totalVotes = demos.reduce((s, d) => s + (d.vote_count || 0), 0);

  document.getElementById('header-stats').innerHTML = `
    <div class="header-stat"><div class="header-stat-num">${demos.length}</div><div class="header-stat-label">参赛项目</div></div>
    <div class="header-stat"><div class="header-stat-num">${totalVotes}</div><div class="header-stat-label">总投票</div></div>
    <div class="header-stat"><div class="header-stat-num">${new Set(demos.map(d=>d.submitter1_dept)).size}</div><div class="header-stat-label">参与团队</div></div>
  `;
  document.getElementById('opt-count').textContent = optCount;
  document.getElementById('bld-count').textContent = bldCount;
  render();
}

function switchTrack(track, btn) {
  activeTrack = track;
  document.querySelectorAll('.track-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('search-input').value = '';
  searchQuery = '';
  render();
}

function onSearch(q) {
  searchQuery = q.toLowerCase();
  render();
}

function render() {
  let list = demos.filter(d => d.track === activeTrack);

  if (searchQuery) {
    list = list.filter(d =>
      d.name.toLowerCase().includes(searchQuery) ||
      (d.keywords || '').toLowerCase().includes(searchQuery) ||
      (d.summary || '').toLowerCase().includes(searchQuery) ||
      (d.submitter1_name || '').toLowerCase().includes(searchQuery) ||
      (d.ext && d.ext.ext_desc || '').toLowerCase().includes(searchQuery)
    );
  }

  // Sort by score desc, then by name
  list.sort((a, b) => (b.score || 0) - (a.score || 0) || a.name.localeCompare(b.name, 'zh'));

  const grid = document.getElementById('project-grid');
  if (!list.length) {
    grid.innerHTML = '<div class="empty-state">没有匹配的项目</div>';
    return;
  }
  grid.innerHTML = list.map(d => cardHTML(d)).join('');
}

function cardHTML(d) {
  const hasImg = d.media_local && d.media_local.length;
  const imgHTML = hasImg
    ? `<img class="project-img" src="media/${d.media_local[0]}" alt="" loading="lazy" onerror="this.outerHTML=phHTML('${d.track}')">`
    : phHTML(d.track);

  const rank = d._rank || 99;
  const rc = rank === 1 ? 'r1' : rank === 2 ? 'r2' : rank === 3 ? 'r3' : 'rn';
  const rankBadge = (d.score > 0 || rank <= 26)
    ? `<div class="project-rank-badge ${rc}">${rank}</div>` : '';

  const kw = (d.keywords || '').split(/[、,，]/).filter(Boolean).slice(0, 4)
    .map(k => `<span class="keyword-tag">${esc(k.trim())}</span>`).join('');
  const summary = d.ext && d.ext.ext_desc ? d.ext.ext_desc : (d.summary || '');

  const excBadge = d.ext ? '<div class="exclusive-badge">独家内容</div>' : '';

  // Parse demo links for card display
  let cardLinksHTML = '';
  try {
    let demoLinks = [];
    if (typeof d.demo_link === 'string' && d.demo_link.startsWith('['))
      demoLinks = JSON.parse(d.demo_link);
    else if (typeof d.demo_link === 'string' && d.demo_link.startsWith('http'))
      demoLinks = [{ title: '', url: d.demo_link }];
    if (demoLinks.length) {
      const show = demoLinks.slice(0, 2);
      const more = demoLinks.length > 2 ? `<div class="card-links-more">+${demoLinks.length - 2} 更多链接</div>` : '';
      cardLinksHTML = `<div class="card-links" onclick="event.stopPropagation()">
        ${show.map(l => `<a class="card-link" href="${esc(l.url)}" target="_blank" rel="noopener" title="${esc(l.url)}"><span class="card-link-icon">🔗</span>${esc(l.url)}</a>`).join('')}
        ${more}
      </div>`;
    }
  } catch(e) {}

  return `<div class="project-card" onclick="openModal(${d.id})">
    ${imgHTML}${rankBadge}${excBadge}
    <div class="project-body">
      <div class="project-title">${esc(d.name)}</div>
      <div class="project-summary">${esc(summary)}</div>
      <div class="project-keywords">${kw}</div>
      ${cardLinksHTML}
      <div class="project-footer">
        <span class="project-author">${esc(d.submitter1_name)} · ${esc(d.submitter1_dept)}${d.submitter2_name ? ' & ' + esc(d.submitter2_name) : ''}</span>
        ${d.score > 0 ? `<span class="project-score-badge">${d.score} 分 · ${d.vote_count} 票</span>` : ''}
      </div>
    </div>
  </div>`;
}

function phHTML(track) {
  return `<div class="project-img-placeholder ${track}">${track === 'optimizer' ? '⚡' : '🛠️'}</div>`;
}

// Modal
function openModal(id) {
  const d = demos.find(x => x.id === id);
  if (!d) return;

  let links = [];
  try {
    if (typeof d.demo_link === 'string' && d.demo_link.startsWith('['))
      links = JSON.parse(d.demo_link);
    else if (typeof d.demo_link === 'string' && d.demo_link.startsWith('http'))
      links = [{ title: 'Demo', url: d.demo_link }];
  } catch (e) {}

  const linksHTML = links.length ? `<div class="modal-section"><h3>相关链接</h3><div class="modal-links">
    ${links.map(l => `<a class="modal-link" href="${esc(l.url)}" target="_blank" rel="noopener">🔗 ${esc(l.title || '链接')}</a>`).join('')}
  </div></div>` : '';

  const gallery = d.media_local && d.media_local.length
    ? `<div class="modal-gallery">${d.media_local.map(f => `<img src="media/${f}" alt="" loading="lazy" onerror="this.style.display='none'">`).join('')}</div>` : '';

  let extHTML = '';
  if (d.ext) {
    const e = d.ext;
    let featHTML = '';
    if (e.ext_features && e.ext_features.length) {
      featHTML = `<ul class="ext-features">${e.ext_features.map(f => `<li>${esc(f)}</li>`).join('')}</ul>`;
    }
    // Determine source label
    const srcMap = {
      'xhscdn_dashboard': 'xhscdn 静态看板',
      'github': 'GitHub',
      'vercel': 'Vercel Demo',
      'netlify': 'Netlify Demo',
      'pages': 'Pages 站点',
    };
    let srcLabel = '外部公开链接';
    if (e.ext_source && srcMap[e.ext_source]) srcLabel = srcMap[e.ext_source];
    else if (e.ext_links) {
      const link0 = (e.ext_links[0] || '');
      if (link0.includes('github')) srcLabel = 'GitHub';
      else if (link0.includes('vercel')) srcLabel = 'Vercel Demo';
      else if (link0.includes('netlify')) srcLabel = 'Netlify Demo';
      else if (link0.includes('pages.dev')) srcLabel = 'Pages 站点';
      else if (link0.includes('github.io')) srcLabel = 'GitHub Pages';
      else if (link0.includes('manus.space')) srcLabel = 'Manus Demo';
    }

    extHTML = `<div class="ext-detail">
      <div class="ext-exclusive-tag">&#9733; 原站未展示内容</div>
      <span class="ext-source-tag">来源: ${esc(srcLabel)}</span>
      <h4 style="margin-top:10px">${esc(e.ext_title || '')}</h4>
      <p>${esc(e.ext_desc || '')}</p>
      ${featHTML}
    </div>`;
  }

  // Competitors
  let compHTML = '';
  if (d.ext && d.ext.competitors && d.ext.competitors.length) {
    compHTML = `<div class="competitors-section">
      <h3>GitHub 相关项目 / 竞品</h3>
      <div class="competitor-list">
        ${d.ext.competitors.map(c => `<a class="competitor-item" href="${esc(c.url)}" target="_blank" rel="noopener">
          <span class="comp-stars">★ ${esc(c.stars)}</span>
          <div class="comp-info">
            <div class="comp-name">${esc(c.name)}</div>
            <div class="comp-desc">${esc(c.desc)}</div>
          </div>
        </a>`).join('')}
      </div>
    </div>`;
  }

  const trackLabel = d.track === 'optimizer' ? '⚡ Optimizer' : '🛠️ Builder';
  const trackCls = d.track;

  document.getElementById('modal').innerHTML = `
    <div class="modal-drag-handle"></div>
    <button class="modal-close" onclick="closeModal()">✕</button>
    ${gallery}
    <div class="modal-body">
      <div class="modal-track-score">
        <span class="project-track ${trackCls}" style="display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;background:var(--${trackCls}-bg);color:var(--${trackCls})">${trackLabel}</span>
        ${d._rank ? `<span style="font-size:13px;color:var(--text3)">第 ${d._rank} 名</span>` : ''}
        ${d.score > 0 ? `<span class="project-score-badge" style="font-size:14px">${d.score} 分 · ${d.vote_count} 票</span>` : ''}
      </div>
      <h2>${esc(d.name)}</h2>
      <p class="modal-meta" style="margin-top:6px">${esc(d.submitter1_name)} · ${esc(d.submitter1_dept)}${d.submitter2_name ? ' & ' + esc(d.submitter2_name) + ' · ' + esc(d.submitter2_dept || '') : ''}</p>
      <p class="modal-meta" style="margin-top:4px">关键词: ${esc(d.keywords || '无')}</p>

      ${extHTML}

      <div class="modal-section"><h3>简介</h3><div class="content">${esc(d.summary || '')}</div></div>
      ${d.background ? `<div class="modal-section"><h3>背景</h3><div class="content">${d.background}</div></div>` : ''}
      ${d.solution ? `<div class="modal-section"><h3>方案</h3><div class="content">${d.solution}</div></div>` : ''}
      ${linksHTML}
      ${compHTML}
    </div>
  `;
  document.getElementById('modal-overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Mobile: swipe-down to close modal
(function() {
  let startY = 0, currentY = 0, dragging = false;
  const overlay = document.getElementById('modal-overlay');
  const modal = document.getElementById('modal');

  modal.addEventListener('touchstart', function(e) {
    if (modal.scrollTop <= 0) {
      startY = e.touches[0].clientY;
      dragging = true;
    }
  }, { passive: true });

  modal.addEventListener('touchmove', function(e) {
    if (!dragging) return;
    currentY = e.touches[0].clientY;
    const diff = currentY - startY;
    if (diff > 0) {
      modal.style.transform = `translateY(${diff}px)`;
      modal.style.transition = 'none';
    }
  }, { passive: true });

  modal.addEventListener('touchend', function() {
    if (!dragging) return;
    dragging = false;
    const diff = currentY - startY;
    modal.style.transition = 'transform .3s ease';
    if (diff > 120) {
      modal.style.transform = 'translateY(100%)';
      setTimeout(function() {
        closeModal();
        modal.style.transform = '';
        modal.style.transition = '';
      }, 300);
    } else {
      modal.style.transform = '';
    }
    startY = 0; currentY = 0;
  }, { passive: true });
})();

function esc(s) {
  if (!s) return '';
  const el = document.createElement('div');
  el.textContent = s;
  return el.innerHTML;
}

init();
</script>
